name: sahel-signal-frontend-staging

services:
  frontend:
    image: ghcr.io/seventechgroup/frontend:${FRONTEND_IMAGE_TAG:?Set FRONTEND_IMAGE_TAG to an immutable staging-SHA tag}
    restart: unless-stopped
    ports:
      - '127.0.0.1:${FRONTEND_PORT:-8080}:8080'
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O', '/dev/null', 'http://127.0.0.1:8080/healthz']
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
